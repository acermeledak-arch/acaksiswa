<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Aplikasi Pengacakan Rombongan Belajar Siswa - Sistem pembagian kelas otomatis dengan pemerataan gender dan constraint">
  <title>Acak Siswa — Pengacakan Rombel</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"

  <!-- jsPDF (local) -->
  <script src="js/lib/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="css/style.css">

  <div id="app">

    <div class="page active" id="page-dashboard"></div>
